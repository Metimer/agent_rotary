name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build and test tools
        run: python -m pip install maturin pytest pytest-asyncio
      - name: Build wheel
        run: maturin build
      - name: Install wheel
        run: python -m pip install --force-reinstall target/wheels/*.whl
      - name: Test Python API
        run: pytest -q
